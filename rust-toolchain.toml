[toolchain]
# Pinned to the exact stable version active at workspace init (2026-05-06).
# Do NOT use "stable" — pinning prevents surprise breakage when stable advances.
# Edition 2024 (set in Cargo.toml) requires Rust 1.85+; 1.95.0 satisfies this.
# To upgrade: run `rustup update stable`, note the new version, update this file,
# and open a PR so the change is reviewed and the toolchain switch is intentional.
channel    = "1.95.0"
components = ["rustfmt", "clippy", "rust-src"]
profile    = "minimal"
